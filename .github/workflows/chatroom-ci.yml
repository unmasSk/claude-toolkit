name: Chatroom CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            chatroom/node_modules
            chatroom/apps/backend/node_modules
            chatroom/apps/frontend/node_modules
            chatroom/apps/bridge/node_modules
            chatroom/packages/shared/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('chatroom/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: chatroom
        run: bun install

      - name: Typecheck backend
        working-directory: chatroom/apps/backend
        run: bun run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            chatroom/node_modules
            chatroom/apps/backend/node_modules
            chatroom/apps/frontend/node_modules
            chatroom/apps/bridge/node_modules
            chatroom/packages/shared/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('chatroom/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: chatroom
        run: bun install

      - name: Run tests
        working-directory: chatroom/apps/backend
        run: bun test
